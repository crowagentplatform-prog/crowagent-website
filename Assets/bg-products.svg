<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="pglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0CC9A8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1440" height="600" fill="url(#pglow)"/>
  <!-- Horizontal circuit traces -->
  <g stroke="#0CC9A8" stroke-opacity="0.07" stroke-width="1" fill="none">
    <line x1="0" y1="120" x2="380" y2="120"/>
    <line x1="380" y1="120" x2="420" y2="160"/>
    <line x1="420" y1="160" x2="680" y2="160"/>
    <line x1="680" y1="160" x2="720" y2="120"/>
    <line x1="720" y1="120" x2="1440" y2="120"/>
    <line x1="0" y1="300" x2="260" y2="300"/>
    <line x1="260" y1="300" x2="300" y2="260"/>
    <line x1="300" y1="260" x2="560" y2="260"/>
    <line x1="560" y1="260" x2="600" y2="300"/>
    <line x1="600" y1="300" x2="880" y2="300"/>
    <line x1="880" y1="300" x2="920" y2="340"/>
    <line x1="920" y1="340" x2="1200" y2="340"/>
    <line x1="1200" y1="340" x2="1240" y2="300"/>
    <line x1="1240" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="480" x2="480" y2="480"/>
    <line x1="480" y1="480" x2="520" y2="440"/>
    <line x1="520" y1="440" x2="760" y2="440"/>
    <line x1="760" y1="440" x2="800" y2="480"/>
    <line x1="800" y1="480" x2="1440" y2="480"/>
  </g>
  <!-- Vertical connectors -->
  <g stroke="#0CC9A8" stroke-opacity="0.05" stroke-width="1" fill="none">
    <line x1="380" y1="0" x2="380" y2="120"/>
    <line x1="720" y1="0" x2="720" y2="120"/>
    <line x1="300" y1="160" x2="300" y2="260"/>
    <line x1="600" y1="260" x2="600" y2="300"/>
    <line x1="920" y1="300" x2="920" y2="340"/>
    <line x1="520" y1="440" x2="520" y2="600"/>
  </g>
  <!-- Junction nodes -->
  <g fill="#0CC9A8" fill-opacity="0.18">
    <circle cx="380" cy="120" r="3"/>
    <circle cx="420" cy="160" r="2"/>
    <circle cx="680" cy="160" r="2"/>
    <circle cx="720" cy="120" r="3"/>
    <circle cx="260" cy="300" r="2"/>
    <circle cx="300" cy="260" r="3"/>
    <circle cx="560" cy="260" r="2"/>
    <circle cx="600" cy="300" r="3"/>
    <circle cx="880" cy="300" r="2"/>
    <circle cx="920" cy="340" r="3"/>
    <circle cx="1200" cy="340" r="2"/>
    <circle cx="480" cy="480" r="3"/>
    <circle cx="520" cy="440" r="2"/>
    <circle cx="760" cy="440" r="2"/>
    <circle cx="800" cy="480" r="3"/>
  </g>
  <!-- Glowing nodes (larger) -->
  <g fill="none" stroke="#0CC9A8" stroke-opacity="0.15" stroke-width="1">
    <circle cx="380" cy="120" r="7"/>
    <circle cx="720" cy="120" r="7"/>
    <circle cx="300" cy="260" r="7"/>
    <circle cx="600" cy="300" r="7"/>
    <circle cx="920" cy="340" r="7"/>
    <circle cx="480" cy="480" r="7"/>
    <circle cx="800" cy="480" r="7"/>
  </g>
</svg>