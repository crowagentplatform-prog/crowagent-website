<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="horizon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0CC9A8" stop-opacity="0"/>
      <stop offset="20%" stop-color="#0CC9A8" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#0CC9A8" stop-opacity="0.14"/>
      <stop offset="80%" stop-color="#0CC9A8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hfade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0CC9A8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
    <filter id="hblur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>
  <!-- Horizon glow band -->
  <rect x="0" y="0" width="1440" height="2" fill="url(#horizon)"/>
  <!-- Soft glow above horizon -->
  <rect x="0" y="0" width="1440" height="120" fill="url(#hfade)" filter="url(#hblur)"/>
  <!-- Subtle grid lines -->
  <g stroke="#0CC9A8" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="80" x2="1440" y2="80"/>
    <line x1="0" y1="160" x2="1440" y2="160"/>
    <line x1="0" y1="240" x2="1440" y2="240"/>
    <line x1="0" y1="320" x2="1440" y2="320"/>
  </g>
  <!-- Vertical grid -->
  <g stroke="#0CC9A8" stroke-opacity="0.02" stroke-width="1">
    <line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="540" y1="0" x2="540" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1080" y1="0" x2="1080" y2="400"/>
    <line x1="1260" y1="0" x2="1260" y2="400"/>
  </g>
</svg>