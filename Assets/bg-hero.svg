<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="blob1" cx="25%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#0CC9A8" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#0CC9A8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0CC9A8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="78%" cy="65%" r="38%">
      <stop offset="0%" stop-color="#0CC9A8" stop-opacity="0.08"/>
      <stop offset="55%" stop-color="#5BC8FF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5BC8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="55%" cy="10%" r="30%">
      <stop offset="0%" stop-color="#0AA88C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0AA88C" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>
  <!-- Primary blob — left-centre -->
  <ellipse cx="360" cy="280" rx="420" ry="340" fill="url(#blob1)" filter="url(#blur1)"/>
  <!-- Secondary blob — right-bottom -->
  <ellipse cx="1120" cy="520" rx="360" ry="300" fill="url(#blob2)" filter="url(#blur1)"/>
  <!-- Top accent -->
  <ellipse cx="790" cy="80" rx="280" ry="180" fill="url(#blob3)" filter="url(#blur2)"/>
  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="0.8" fill="#0CC9A8" fill-opacity="0.08"/>
  </pattern>
  <rect width="1440" height="800" fill="url(#dots)"/>
</svg>