<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="stream1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2FF57" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C2FF57" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#0CC9A8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stream2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0CC9A8" stop-opacity="0"/>
      <stop offset="40%" stop-color="#C2FF57" stop-opacity="0.05"/>
      <stop offset="80%" stop-color="#C2FF57" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#C2FF57" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="stream3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C2FF57" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C2FF57" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0CC9A8" stop-opacity="0"/>
    </linearGradient>
    <filter id="sf">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <!-- Stream bands -->
  <rect x="0" y="60" width="1440" height="40" rx="20" fill="url(#stream1)" filter="url(#sf)"/>
  <rect x="0" y="180" width="1440" height="28" rx="14" fill="url(#stream2)" filter="url(#sf)"/>
  <rect x="0" y="300" width="1440" height="50" rx="25" fill="url(#stream1)" filter="url(#sf)"/>
  <rect x="0" y="420" width="1440" height="32" rx="16" fill="url(#stream3)" filter="url(#sf)"/>
  <!-- Diagonal accent lines -->
  <g stroke="#C2FF57" stroke-opacity="0.04" stroke-width="1" fill="none">
    <line x1="200" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="800" y2="500"/>
    <line x1="1000" y1="0" x2="1200" y2="500"/>
    <line x1="1300" y1="0" x2="1440" y2="375"/>
  </g>
  <!-- Lime accent dots -->
  <circle cx="360" cy="80" r="1.5" fill="#C2FF57" fill-opacity="0.20"/>
  <circle cx="720" cy="195" r="1.5" fill="#C2FF57" fill-opacity="0.20"/>
  <circle cx="1080" cy="315" r="1.5" fill="#0CC9A8" fill-opacity="0.20"/>
  <circle cx="240" cy="430" r="1.5" fill="#C2FF57" fill-opacity="0.15"/>
  <circle cx="960" cy="440" r="1.5" fill="#C2FF57" fill-opacity="0.15"/>
</svg>